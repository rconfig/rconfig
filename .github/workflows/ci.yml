name: CI

on:
  pull_request:

# Least privilege: these jobs only read the repo, never write back.
permissions:
  contents: read

# Cancel superseded runs for the same ref (e.g. rapid pushes, or push + PR on the same branch).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# composer install runs package:discover, which boots the framework and loads the
# route files. Those resolve paths from APP_DIR_PATH, whose default is the production
# deploy path (/var/www/html/rconfig8/current). On a runner the repo lives in the
# workspace, so point it there or the route requires fail with "No such file".
env:
  APP_DIR_PATH: ${{ github.workspace }}

jobs:
  pint:
    name: Code Style (Pint)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        # actions/checkout v6.0.2 (runs on Node 24)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup PHP
        # shivammathur/setup-php v2.37.1
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc
        with:
          # Only the hard-required extensions not already bundled in the base PHP build.
          php-version: '8.4'
          extensions: ftp, gd, ldap, sockets
          coverage: none

      - name: Prepare .env
        run: cp .env.example .env

      - name: Use SQLite for framework boot
        run: |
          touch "${{ github.workspace }}/database/database.sqlite"
          {
            echo "DB_CONNECTION=sqlite"
            echo "DB_DATABASE=${{ github.workspace }}/database/database.sqlite"
          } >> .env

      - name: Install Composer dependencies
        # ramsey/composer-install v4.0.0 (uses actions/cache v5, runs on Node 24)
        uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda

      - name: Run Pint
        run: vendor/bin/pint --test

  phpstan:
    name: Static Analysis (PHPStan)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        # actions/checkout v6.0.2 (runs on Node 24)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup PHP
        # shivammathur/setup-php v2.37.1
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc
        with:
          # Only the hard-required extensions not already bundled in the base PHP build.
          php-version: '8.4'
          extensions: ftp, gd, ldap, sockets
          coverage: none

      - name: Prepare .env
        run: cp .env.example .env

      - name: Use SQLite for framework boot
        run: |
          touch "${{ github.workspace }}/database/database.sqlite"
          {
            echo "DB_CONNECTION=sqlite"
            echo "DB_DATABASE=${{ github.workspace }}/database/database.sqlite"
          } >> .env

      - name: Install Composer dependencies
        # ramsey/composer-install v4.0.0 (uses actions/cache v5, runs on Node 24)
        uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda

      - name: Cache PHPStan result cache
        # actions/cache v5.0.5 (runs on Node 24)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: .phpstan
          # Save a fresh cache per commit; fall back to the most recent prior run for incremental reuse.
          key: phpstan-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            phpstan-${{ runner.os }}-

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=-1 --error-format=github

  eslint:
    name: Frontend Lint (ESLint)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        # actions/checkout v6.0.2 (runs on Node 24)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node
        # actions/setup-node v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          # Pinned to the current LTS
          node-version: '22'
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  vitest:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        # actions/checkout v6.0.2 (runs on Node 24)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node
        # actions/setup-node v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          # Pinned to the current LTS
          node-version: '22'
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test